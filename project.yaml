project:
  name: OASIS-FinFET
  device: SOI_single_fin_FinFET

coordinates:
  x: source_to_drain
  y: fin_width
  z: fin_height

fixed:
  gate_length_nm: null
  fin_height_nm: null
  fin_width_nm: null
  eot_nm: null
  vdd_V: null
  temperature_K: 300

materials:
  fin: Silicon
  box: SiO2
  gate_dielectric: HfO2
  gate_metal: TiN
  baseline_spacer: Si3N4
  low_k: SiO2

circuit_evaluation:
  primary: three_stage_ring_oscillator
  stage_count: 3
  unit_cell_check: cmos_inverter
  primary_metrics:
    - oscillation_frequency_Hz
    - stage_delay_s
    - average_power_W
    - energy_per_cycle_J
    - edp_Js

design_space:
  l_sp_s_nm: [3.0, 7.0]
  l_sp_d_nm: [5.0, 11.0]
  w_low_k_nm: [0.0, 4.0]

constraints:
  - l_sp_d_nm >= l_sp_s_nm
  - w_low_k_nm <= l_sp_d_nm

robust_validation:
  absolute_variation_nm: [0.3, 0.5]
  include_one_at_a_time: true
  include_combined_corners: true
  guardrails:
    min_ion_retention_pct: 95.0
    max_edp_degradation_pct: 10.0
    min_cgd_reduction_retention_pct: 80.0
    min_compensation_pct: 70.0
  metrics:
    ion: ion_A
    cgd: cgd_F
    edp: edp_Js

reproducibility:
  seed: 20260723
  keep_failed_runs: true
